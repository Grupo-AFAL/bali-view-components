name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: spec/dummy/yarn.lock
      - name: Install Node dependencies
        run: cd spec/dummy && yarn install
      - name: Set up database schema
        run: bin/rails db:schema:load
        env:
          RAILS_ENV: test
      - name: Build assets
        run: cd spec/dummy && bin/rails tailwindcss:build && yarn build
      - name: Run tests with coverage
        run: bundle exec rails test
        env:
          COVERAGE: '1'
      - name: Coverage summary
        if: always()
        run: |
          [ -f coverage/.last_run.json ] || exit 0
          LINE=$(ruby -rjson -e "puts JSON.parse(File.read('coverage/.last_run.json'))['result']['line']")
          BRANCH=$(ruby -rjson -e "puts JSON.parse(File.read('coverage/.last_run.json'))['result']['branch']")

          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage | Minimum |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Line | ${LINE}% | 80% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${BRANCH}% | — |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if (( $(echo "$LINE < 80" | bc -l) )); then
            echo "> **Line coverage is below 80% minimum.** Add tests to increase coverage." >> $GITHUB_STEP_SUMMARY
          fi
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('coverage/.last_run.json', 'utf8'));
            const line = data.result.line;
            const branch = data.result.branch;
            const status = line >= 80 ? ':white_check_mark:' : ':x:';

            const body = [
              `## ${status} Test Coverage`,
              '',
              '| Metric | Coverage | Minimum |',
              '|--------|----------|---------|',
              `| Line | **${line}%** | 80% |`,
              `| Branch | **${branch}%** | — |`,
              '',
              line < 80 ? '> **Line coverage is below 80% minimum.** Add tests to increase coverage.' : '',
              '',
              '*Generated by CI — updates on each push.*'
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Test Coverage') && c.body.includes('Generated by CI'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
