name: StandardJS
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  standardjs:
    name: StandardJS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'yarn'

      - run: yarn install
      - run: yarn standard
