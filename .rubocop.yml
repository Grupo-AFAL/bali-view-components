inherit_gem:
  rubocop-rails-omakase: rubocop.yml

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  Exclude:
    - 'app/components/bali/*/preview.rb'
    - 'app/components/bali/*/*/preview.rb'
    - 'coverage/**/*'
    - 'log/*'
    - 'config/**/*'
    - 'public/**/*'
    - 'storage/**/*'
    - 'tmp/**/*'
    - 'script/**/*'
    - 'node_modules/**/*'
    - 'spec/dummy/node_modules/**/*'
    - 'lib/tasks/bali_tasks.rake'
    - 'bin/**/*'
    - 'vendor/**/*'
    - 'spec/spec_helper.rb'
    - 'spec/dummy/bin/*'
    - 'spec/dummy/config/**/*'
    - 'spec/dummy/db/**/*'
    - 'spec/dummy/public/**/*'

# Gem-specific: component library needs html_safe for rendering
Rails/OutputSafety:
  Enabled: false

Rails/SkipsModelValidations:
  Enabled: false

Rails/HasAndBelongsToMany:
  Enabled: false

Rails/I18nLocaleTexts:
  Exclude:
    - 'spec/dummy/**/*'

# Complex filter/form modules have legitimate complexity
Metrics/PerceivedComplexity:
  Exclude:
    - 'lib/bali/filter_form/**/*'
    - 'lib/bali/form_builder/**/*'

# ViewComponent#initialize intentionally doesn't call super
Lint/MissingSuper:
  Exclude:
    - app/components/**/*
